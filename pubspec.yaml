name: aplikasi_jasa_sewa_laptop
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.15.0         # Package utama Drift
  drift_sqflite: ^2.0.0  # Penghubung Drift ke Sqflite
  sqlite3_flutter_libs: ^0.5.20 # Menyediakan library sqlite3 yang up-to-date
  loading_animation_widget: ^1.3.0
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.15.0     # Code generator untuk Drift
  build_runner: ^2.4.8
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/login_ui0.png
    - assets/images/login_ui1.png
    - assets/images/mu.png
    - assets/images/laptop_thinkpad.png
    - assets/images/laptop_rog.png
    - assets/images/laptop_hp.png
    - assets/images/laptop_mac.png
    - assets/images/rog.png
    - assets/images/logo.png
    - assets/images/pp.png
    - assets/images/new_logo.png

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
